<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Заявка принята — daAgency</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="shortcut icon" href="img/photo_2025-08-26_21-.jpg" type="image/x-icon" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #000;
      color: #f2f2f2;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ---- HEADER ---- */
    header {
      position: fixed;
      top: 0; left: 0; width: 100%;
      z-index: 100;
      pointer-events: none;
    }
    .header-inner {
      width: min(1560px, calc(100% - 72px));
      margin: 0 auto;
      padding: 18px 0 0;
      display: grid;
      grid-template-columns: 150px 1fr 230px;
      align-items: center;
      column-gap: 24px;
      pointer-events: auto;
    }
    .brand-logo {
      width: 140px; height: 74px;
      background-repeat: no-repeat;
      background-size: contain;
      background-position: left center;
      background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAY4AAAHTCAYAAAAwFP9VAAAACXBIWXMAAAsTAAALEwEAmpwYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAGwSURBVHgB7cExAQAAAMKg9U9tDB+gAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAeAMBuAABHQAAAABJRU5ErkJggg==");
      display: block;
    }

    /* ---- HERO ---- */
    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 140px 24px 80px;
      position: relative;
      overflow: hidden;
    }

    /* Glow background */
    .page::before {
      content: "";
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 900px; height: 900px;
      background: radial-gradient(circle, rgba(255,90,10,.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 680px;
    }

    .icon-wrap {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: rgba(255,90,10,.15);
      border: 2px solid rgba(255,90,10,.4);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 40px;
      animation: pulse 2.5s ease-in-out infinite;
    }
    .icon-wrap svg {
      width: 44px; height: 44px;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,90,10,.35); }
      50%       { box-shadow: 0 0 0 20px rgba(255,90,10,0); }
    }

    h1 {
      font-size: clamp(40px, 5vw, 72px);
      font-weight: 800;
      letter-spacing: -0.05em;
      line-height: 1;
      margin-bottom: 24px;
      color: #f2f2f2;
    }

    .sub {
      font-size: 18px;
      line-height: 1.6;
      color: rgba(255,255,255,.58);
      margin-bottom: 52px;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }

    .actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 52px;
      padding: 0 32px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      text-decoration: none;
      transition: .22s ease;
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background: #ff5a0a;
      color: #fff;
    }
    .btn-primary:hover { background: #ff6a22; }
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255,255,255,.22);
      color: #fff;
    }
    .btn-outline:hover { border-color: rgba(255,255,255,.5); background: rgba(255,255,255,.04); }

    /* countdown */
    .redirect-note {
      margin-top: 28px;
      font-size: 13px;
      color: rgba(255,255,255,.35);
    }
    #countdown { color: rgba(255,90,10,.8); font-weight: 600; }

    @media (max-width: 640px) {
      .header-inner { width: calc(100% - 28px); grid-template-columns: 96px 1fr; padding-top: 12px; }
      .brand-logo { width: 80px; height: 44px; }
      .actions { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" aria-label="DA Agency">
      <span class="brand-logo"></span>
    </a>
  </div>
</header>

<main class="page">
  <div class="content">
    <div class="icon-wrap">
      <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="22" cy="22" r="21" stroke="#ff5a0a" stroke-width="2"/>
        <path d="M12 22.5L19 30L32 15" stroke="#ff5a0a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1>Заявка принята!</h1>
    <p class="sub">
      Мы получили вашу заявку и свяжемся с вами в&nbsp;течение рабочего дня. Готовимся к знакомству!
    </p>

    <div class="actions">
      <a href="index.html" class="btn btn-primary">На главную</a>
      <a href="index.html#cases" class="btn btn-outline">Посмотреть кейсы</a>
    </div>

    <p class="redirect-note">
      Автоматический переход через <span id="countdown">8</span> сек.
    </p>
  </div>
</main>

<script>
  var n = 8;
  var el = document.getElementById('countdown');
  var t = setInterval(function() {
    n--;
    if (el) el.textContent = n;
    if (n <= 0) { clearInterval(t); window.location.href = 'index.html'; }
  }, 1000);
</script>

</body>
</html>
