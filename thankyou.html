  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #000;
      color: #f2f2f2;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;

    /* ---- HEADER (matches main site) ---- */
    .da-header {
      position: fixed;
      top: 0; left: 0; width: 100%;
      z-index: 100;
      pointer-events: none;
    }
    .da-header-inner {
      position: relative;
      width: min(1560px, calc(100% - 72px));
      margin: 0 auto;
      padding: 18px 0 0;
      display: grid;
      grid-template-columns: 150px 1fr 230px;
      align-items: center;
      column-gap: 24px;
      pointer-events: auto;
    }
    .da-header-inner::before {
      content: "";
      position: absolute;
      inset: 0 -24px auto;
      height: 78px;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,.08);
      border-radius: 0 0 16px 16px;
      z-index: -1;
    }
    .brand-logo {
      width: 140px; height: 74px;
      background-repeat: no-repeat;
      background-size: contain;
      background-position: left center;
      background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAY4AAAHTCAYAAAAwFP9VAAAACXBIWXMAAAsTAAALEwEAmpwYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAGwSURBVHgB7cExAQAAAMKg9U9tDB+gAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAeAMBuAABHQAAAABJRU5ErkJggg==");
      display: block;
    }
    .da-header-cta {
      display: flex;
      justify-content: flex-end;
    }

    /* ---- PAGE ---- */
    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 140px 24px 80px;
      position: relative;
      overflow: hidden;
    }

    /* Animated glow */
    .page::before {
      content: "";
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 900px; height: 900px;
      background: radial-gradient(circle, rgba(255,90,10,.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: glowPulse 4s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%, 100% { opacity: .7; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    }

    /* Particles */
    .particles {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      width: 2px; height: 2px;
      background: rgba(255,90,10,.4);
      border-radius: 50%;
      animation: floatUp linear infinite;
    }
    .particle:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; }
    .particle:nth-child(2) { left: 20%; animation-duration: 10s; animation-delay: 2s; width: 3px; height: 3px; }
    .particle:nth-child(3) { left: 35%; animation-duration: 14s; animation-delay: 4s; }
    .particle:nth-child(4) { left: 50%; animation-duration: 11s; animation-delay: 1s; width: 3px; height: 3px; }
    .particle:nth-child(5) { left: 65%; animation-duration: 13s; animation-delay: 3s; }
    .particle:nth-child(6) { left: 78%; animation-duration: 9s; animation-delay: 5s; width: 4px; height: 4px; }
    .particle:nth-child(7) { left: 88%; animation-duration: 15s; animation-delay: 2s; }
    .particle:nth-child(8) { left: 45%; animation-duration: 11s; animation-delay: 6s; width: 3px; height: 3px; }
    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) scale(1); opacity: 0; }
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 680px;
      animation: fadeInUp .8s ease-out;
    }
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: rgba(255,90,10,.15);
      border: 2px solid rgba(255,90,10,.4);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 40px;
      animation: pulse 2.5s ease-in-out infinite;
    }
    .icon-wrap svg { width: 44px; height: 44px; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,90,10,.35); }
      50%       { box-shadow: 0 0 0 20px rgba(255,90,10,0); }
    }

    h1 {

    .sub {
      font-size: 18px;
      line-height: 1.6;
      color: rgba(255,255,255,.58);
      margin-bottom: 52px;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }

    .actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 52px;
      padding: 0 32px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      text-decoration: none;
      transition: all .22s ease;
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background: #ff5a0a;
      color: #fff;
    }
    .btn-primary:hover {
      background: #ff6a22;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255,90,10,.3);
    }
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255,255,255,.22);
      color: #fff;
    }
    .btn-outline:hover {
      border-color: rgba(255,255,255,.5);
      background: rgba(255,255,255,.04);
      transform: translateY(-2px);
    }

    .divider {
      width: 60px;
      height: 1px;
      background: rgba(255,255,255,.12);
      margin: 36px auto 28px;
    }

    .redirect-note {
      font-size: 13px;
      color: rgba(255,255,255,.35);
    }
    #countdown { color: rgba(255,90,10,.8); font-weight: 600; }

    .progress-bar {
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,.08);
      border-radius: 2px;
      margin: 16px auto 0;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff5a0a, #ff8a4a);
      border-radius: 2px;
      animation: progressShrink 8s linear forwards;
    }
    @keyframes progressShrink {
      0% { width: 100%; }
      100% { width: 0%; }
    }

    .footer {
      position: absolute;
      bottom: 0; left: 0; width: 100%;
      padding: 24px;
      text-align: center;
      z-index: 1;
    }
    .footer-text {
      font-size: 12px;
      color: rgba(255,255,255,.2);
      letter-spacing: .05em;
    }

    @media (max-width: 640px) {
      .da-header-inner {
        width: calc(100% - 28px);
        grid-template-columns: 96px 1fr;
        padding-top: 12px;
      }
      .da-header-inner::before { height: 64px; }
      .brand-logo { width: 80px; height: 44px; }
      .da-header-cta .btn { min-height: 44px; padding: 0 16px; font-size: 13px; }
      .actions { flex-direction: column; }
      .btn { width: 100%; }
      .page { padding: 120px 20px 80px; }
    }
  </style>
