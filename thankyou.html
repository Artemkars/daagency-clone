<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Спасибо за заявку! | DA Agency</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .wrap {
            padding: 20px;
            max-width: 480px;
        }
        h1 {
            font-size: 42px;
            font-weight: 800;
            margin: 0 0 16px;
            background: linear-gradient(135deg, #ff5a0a 0%, #ff7a1a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 18px;
            color: rgba(255,255,255,0.7);
            margin: 0 0 40px;
            line-height: 1.5;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 54px;
            padding: 0 32px;
            background: #ff5a0a;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 700;
            font-size: 16px;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #ff6a22;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Спасибо!</h1>
        <p>Ваша заявка успешно отправлена.<br>Мы свяжемся с вами в ближайшее время для обсуждения проекта.</p>
        <a href="/" class="btn">Вернуться на сайт</a>
    </div>
</body>
</html>
